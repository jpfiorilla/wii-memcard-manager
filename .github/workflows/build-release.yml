name: Build release binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm test -- --run

      - name: Electron build (unsigned mac / Windows installer)
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect installers (DMG / NSIS only)
        shell: bash
        run: |
          mkdir -p installers
          find release -name 'Wii Memcard Manager_*.dmg' -exec cp {} installers/ \;
          find release -name 'Wii Memcard Manager_*.exe' -exec cp {} installers/ \;
          find installers -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: installers/
          if-no-files-found: error

  publish-to-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: List downloaded files
        run: find assets -type f | sort

      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          fail_on_unmatched_files: true
          working_directory: assets
          files: |
            **/*.dmg
            **/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
