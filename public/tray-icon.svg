<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- GC memory card (portrait body + top connector); circular label window; Smash bolt (Melee nod). Template: black + alpha. -->
  <defs>
    <mask id="label-window">
      <rect width="64" height="64" fill="white"/>
      <circle cx="32" cy="40" r="9.5" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#label-window)">
    <!-- Connector plugs upward into controller — narrower than body, centered -->
    <rect x="22" y="6" width="20" height="15" rx="3" fill="#000000"/>
    <!-- Main card face: taller than wide (typical GC memcard proportions) -->
    <rect x="14" y="18" width="36" height="40" rx="5" fill="#000000"/>
  </g>
  <path
    fill="#000000"
    d="M32.8 32.5 L28.2 39.8 L30.8 39.8 L28.5 45.5 L35.2 37.2 L32.2 37.2 L34.5 32.5 Z"
  />
</svg>
